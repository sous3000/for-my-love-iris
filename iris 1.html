<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Iris 💗</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;

            background: linear-gradient(180deg, #ff9bb3, #ffc7d6);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px 25px;
            border-radius: 25px;
            width: 85%;
            max-width: 350px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);

            animation: fadeUp 2s ease forwards;
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 38px;
            color: #ff4d88;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 22px;
            color: #ff6fa3;
            margin-bottom: 25px;
        }

        .letter {
            font-size: 90px;
            text-decoration: none;
            display: block;

            transition: transform 0.2s ease;
        }

        .letter:active {
            transform: scale(1.25);
        }

        .tap {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="title">
            A letter for my baby Iris 💗
        </div>

        <div class="subtitle">
            Happy Birthday 🎂
        </div>

        <a href="page2.html" class="letter">
            💌
        </a>

        <div class="tap">
            tap the letter
        </div>

    </div>

</body>

</html>
